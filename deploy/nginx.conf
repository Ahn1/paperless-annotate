server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json
               application/manifest+json image/svg+xml application/wasm;

    # Vite-Assets tragen Content-Hashes im Dateinamen -> unbegrenzt cachebar
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Einstiegs- und Service-Worker-Dateien duerfen nicht gecacht werden,
    # sonst greift das PWA-autoUpdate nicht
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
    }

    # SPA-Fallback fuer BrowserRouter-Deeplinks
    location / {
        try_files $uri $uri/ /index.html;
    }
}
